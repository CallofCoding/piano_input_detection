name: piano_input_detection
description: >
  Real-time piano note detection from microphone audio using Google Magenta's
  TFLite model. Emits MIDI-standard noteOn / noteOff events (note numbers 0–127).
version: 1.1.0
homepage: https://github.com/CallofCoding/piano_input_detection

environment:
  sdk: ">=2.18.0 <4.0.0"
  flutter: ">=3.0.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.pianopilot.piano_input_detection
        pluginClass: PianoInputDetectionPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
